<svg width="512" height="512" viewBox="64 64 896 896" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Qwen TTS Studio UI Icon</title>
  <desc id="desc">A cropped dark rounded app icon with a neon Q, audio waveform, and voice clone echo waveform.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="60%" stop-color="#1d3557"/>
      <stop offset="100%" stop-color="#16324f"/>
    </linearGradient>

    <linearGradient id="qGradient" x1="226" y1="220" x2="804" y2="806" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#45f3ff"/>
      <stop offset="48%" stop-color="#32f2d4"/>
      <stop offset="100%" stop-color="#72ff65"/>
    </linearGradient>

    <linearGradient id="waveMain" x1="272" y1="0" x2="760" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c8fbff"/>
      <stop offset="42%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d8ffd2"/>
    </linearGradient>

    <linearGradient id="waveEcho" x1="356" y1="0" x2="676" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#18c8ff"/>
      <stop offset="100%" stop-color="#75ff6f"/>
    </linearGradient>

    <clipPath id="tileClip">
      <rect x="64" y="64" width="896" height="896" rx="220"/>
    </clipPath>
  </defs>

  <rect x="64" y="64" width="896" height="896" rx="220" fill="url(#bg)"/>

  <g clip-path="url(#tileClip)">
    <circle
      cx="512"
      cy="506"
      r="292"
      fill="none"
      stroke="url(#qGradient)"
      stroke-width="54"
      stroke-linecap="round"
      opacity="1"/>

    <path
      d="M278 512
         C298 512, 300 488, 320 488
         C344 488, 344 552, 368 552
         C394 552, 392 462, 420 462
         C452 462, 448 608, 480 608
         C510 608, 500 430, 536 430
         C574 430, 560 626, 602 626
         C638 626, 626 474, 662 474
         C694 474, 692 568, 724 568
         C746 568, 746 512, 768 512"
      fill="none"
      stroke="url(#waveMain)"
      stroke-width="20"
      stroke-linecap="round"
      stroke-linejoin="round"
      opacity="0.9"/>

    <path
      d="M354 662
         C374 662, 374 646, 392 646
         C412 646, 408 690, 430 690
         C454 690, 448 628, 474 628
         C500 628, 490 704, 520 704
         C550 704, 540 638, 570 638
         C596 638, 588 684, 614 684
         C636 684, 636 656, 660 656
