name: Windows Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 1.0.0. Defaults to the tag name without v."
        required: false
        type: string
      prerelease:
        description: "Mark the GitHub release as a prerelease."
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  package-windows:
    name: Package Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Initialize build submodules
        shell: pwsh
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive --depth=1

      - name: Resolve release version
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}"
          if ([string]::IsNullOrWhiteSpace($version)) {
            if ("${{ github.ref_type }}" -eq "tag") {
              $version = "${{ github.ref_name }}"
            } else {
              $version = "0.1.${{ github.run_number }}"
            }
          }
          $releaseVersion = $version -replace '^v', ''
          $packageVersion = ($releaseVersion -replace '[^0-9.].*$', '')
          if ($packageVersion -notmatch '^\d+(\.\d+){1,3}$') {
            throw "MSI package version must be numeric, for example 1.0.0. Got '$releaseVersion'."
          }
          "RELEASE_VERSION=$releaseVersion" | Out-File -FilePath $env:GITHUB_ENV -Append
          "APP_VERSION=$packageVersion" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install build tools
        shell: pwsh
        run: |
          choco install ninja cuda -y --no-progress

      - name: Configure CUDA environment
        shell: pwsh
        run: |
          $cudaBase = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA"
          $candidates = @()
          if ($env:CUDA_PATH) {
            $candidates += $env:CUDA_PATH
          }
          if (Test-Path $cudaBase) {
            $candidates += Get-ChildItem -Path $cudaBase -Directory |
              Sort-Object Name -Descending |
              ForEach-Object { $_.FullName }
          }

          $cudaRoot = $candidates |
            Where-Object { $_ -and (Test-Path (Join-Path $_ "bin\nvcc.exe")) } |
            Select-Object -First 1

          if (-not $cudaRoot) {
            throw "CUDA Toolkit was installed, but nvcc.exe was not found under $cudaBase."
          }

          $cudaBin = Join-Path $cudaRoot "bin"
          "CUDA_PATH=$cudaRoot" | Out-File -FilePath $env:GITHUB_ENV -Append
          "CUDAToolkit_ROOT=$cudaRoot" | Out-File -FilePath $env:GITHUB_ENV -Append
          $cudaBin | Out-File -FilePath $env:GITHUB_PATH -Append
          & (Join-Path $cudaBin "nvcc.exe") --version

      - name: Package lean ZIP and MSI
        shell: pwsh
        run: |
          .\scripts\package-windows.ps1 -Cuda -UseNinja -BuildMsi -RequireMsi -Clean

      - name: Collect lean artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifacts -Force | Out-Null
          Copy-Item composeApp\build\compose\binaries\main\portable\qwen-tts-studio-windows-portable.zip artifacts\qwen-tts-studio-${{ env.RELEASE_VERSION }}-windows-cuda-system.zip
          Copy-Item composeApp\build\compose\binaries\main\msi\qwen-tts-studio-*.msi artifacts\qwen-tts-studio-${{ env.RELEASE_VERSION }}-windows-cuda-system.msi

      - name: Package CUDA bundled ZIP and MSI
        shell: pwsh
        run: |
          .\scripts\package-windows.ps1 -Cuda -UseNinja -SkipNativeBuild -BuildMsi -RequireMsi -BundleCudaRuntime

      - name: Collect CUDA bundled artifacts
        shell: pwsh
        run: |
          Copy-Item composeApp\build\compose\binaries\main\portable\qwen-tts-studio-windows-portable.zip artifacts\qwen-tts-studio-${{ env.RELEASE_VERSION }}-windows-cuda-bundled.zip
          Copy-Item composeApp\build\compose\binaries\main\msi\qwen-tts-studio-*.msi artifacts\qwen-tts-studio-${{ env.RELEASE_VERSION }}-windows-cuda-bundled.msi
          Get-ChildItem artifacts

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qwen-tts-studio-windows-${{ env.RELEASE_VERSION }}
          path: artifacts/*

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.RELEASE_VERSION }}
          target_commitish: ${{ github.sha }}
          name: Qwen-TTS Studio ${{ env.RELEASE_VERSION }}
          body: |
            Windows downloads:

            - `windows-cuda-system`: smaller package. Includes the CUDA backend, but requires NVIDIA CUDA runtime DLLs from a local CUDA installation (`CUDA_PATH`, `CUDAToolkit_ROOT`, or `PATH`). Falls back to CPU if CUDA is unavailable.
            - `windows-cuda-bundled`: larger offline package. Includes NVIDIA CUDA runtime DLLs, so CUDA works without a separate CUDA Toolkit installation.
          prerelease: ${{ inputs.prerelease || false }}
          files: artifacts/*
